name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: linux-amd64
          - target: aarch64-unknown-linux-musl
            name: linux-arm64
          - target: armv7-unknown-linux-musleabihf
            name: linux-armv7
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: |
          curl -sSfL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /usr/local/bin cross

      - name: Build release binary
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cross build --release --target ${{ matrix.target }}

      - name: Verify static linking
        run: |
          BINARY="target/${{ matrix.target }}/release/miemietron"
          file "$BINARY"
          if file "$BINARY" | grep -q "dynamically linked"; then
            echo "FAIL: binary is dynamically linked!"
            exit 1
          fi
          if readelf -d "$BINARY" 2>/dev/null | grep -q "NEEDED"; then
            echo "FAIL: has dynamic library dependencies:"
            readelf -d "$BINARY" | grep NEEDED
            exit 1
          fi
          echo "OK: statically linked"

      - name: Package binary
        run: |
          BINARY="miemietron-${{ matrix.name }}"
          cp target/${{ matrix.target }}/release/miemietron "${BINARY}"
          chmod +x "${BINARY}"
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: miemietron-${{ matrix.name }}
          path: |
            miemietron-${{ matrix.name }}
            miemietron-${{ matrix.name }}.sha256
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ && file artifacts/miemietron-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/miemietron-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
