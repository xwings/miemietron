name: CI

on:
  push:
    branches: [dev]
    tags: ["v*"]
  pull_request:
    branches: [dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-features

      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: |
          curl -sSfL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /usr/local/bin cross

      - name: Build release binary
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cross build --release --target ${{ matrix.target }}

      - name: Verify static linking
        run: |
          BINARY="target/${{ matrix.target }}/release/miemietron"
          echo "--- file ---"
          file "$BINARY"
          echo "--- readelf ---"
          readelf -d "$BINARY" 2>&1 || true

          # Must be statically linked (musl)
          if file "$BINARY" | grep -q "dynamically linked"; then
            echo "FAIL: binary is dynamically linked!"
            exit 1
          fi

          # Must be a static PIE or statically linked ELF
          if file "$BINARY" | grep -q "statically linked"; then
            echo "OK: statically linked"
          elif file "$BINARY" | grep -q "static-pie"; then
            echo "OK: static-pie linked"
          elif ! readelf -d "$BINARY" 2>/dev/null | grep -q "NEEDED"; then
            echo "OK: no NEEDED entries (fully static)"
          else
            echo "FAIL: has dynamic library dependencies:"
            readelf -d "$BINARY" | grep NEEDED
            exit 1
          fi

      - name: Print binary size
        run: ls -lh target/${{ matrix.target }}/release/miemietron

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: miemietron-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/miemietron
          retention-days: 7
